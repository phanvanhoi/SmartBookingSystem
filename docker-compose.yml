version: '3.8'

services:
  app:
    build: .
    container_name: musicbox-app
    restart: unless-stopped
    ports:
      - "8081:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:./data/musicbox.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-12h}
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set (comma-separated origins)}
      - FB_APP_SECRET=${FB_APP_SECRET:-}
      - FB_VERIFY_TOKEN=${FB_VERIFY_TOKEN:-}
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      # Persist database + uploads outside container
      - musicbox-data:/app/data
      - musicbox-uploads:/app/uploads
      - musicbox-logs:/app/logs

volumes:
  musicbox-data:
  musicbox-uploads:
  musicbox-logs:
